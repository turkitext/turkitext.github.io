<!DOCTYPE html>
<html lang="azb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تۆرکجه یازېلار</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="index.css" />
</head>
<body>

    <!-- Header / Top Navigation Bar -->
    <header>
        <div class="container navbar">
            <a href="#" class="logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/>
                        <path d="M6 6h10M6 10h10"/>
                    </svg>
                </div>
                <span class="logo-text">باش صفحه</span>
            </a>
            <button class="theme-toggle" id="themeToggle" aria-label="تئمی دڲیشدیرمک">
                <!-- Moon Icon (Shows when Light Mode is active) -->
                <svg id="moonIcon" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <!-- Sun Icon (Shows when Dark Mode is active) -->
                <svg id="sunIcon" viewBox="0 0 24 24" style="display: none;">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>
    </header>

    <!-- Hero Header / Title & Search Tool -->
    <section class="hero">
        <div class="container">
            <h1>تۆرکجه یازېلار</h1>
            <p>ایسته‌دیڲینیز قۏنۇ یا سؤزجۆڲۆ آشاغېدا یازېپ، اۏنۇ، سۇنۇلان مقاله‌لرین و یازېلارین عنوانې و خلاصه‌سینده آختارېنېز.</p>
            
            <!-- Real-time Interactive Search Bar -->
            <div class="search-container">
                <span class="search-icon">
                    <svg viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </span>
                <input type="text" id="searchInput" class="search-input" placeholder="آچار سؤز، قۏنۇ و یا یازې آدېنې آختارېنېز..." aria-label="آختارېش">
                <button id="searchClear" class="search-clear" aria-label="سیلمک">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <!-- Dynamic Fast Keywords (Tags) for Filtering -->
            <div class="tags-filter-container" id="tagsContainer">
                <!-- Tags will be rendered dynamically by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Main Section / List of Classified Cards -->
    <main class="main-content">
        <div class="container">
            <div class="section-header">
                <span class="section-title" id="sectionTitle">بۆتۆن یازېلار</span>
                <span class="results-count" id="resultsCount">تاپېلېپ...</span>
            </div>

            <!-- Card Grid Layout -->
            <div class="cards-grid" id="cardsGrid">
                <!-- Cards will be populated dynamically from JS array -->
            </div>
        </div>
    </main>

    <!-- Global Footer -->
    <footer>
        <div class="container footer-content">
            <div class="footer-text">
                <p class="footer-brand">تۆرکجه یازېلار مخزنی</p>
                <p>بۇ صقحه‌ده‌کی یازېلار GPL-3.0 لایسئنسی ایله یایېملانمېشلار.</p>
            </div>
        </div>
    </footer>

    <!-- Vanilla Javascript Logic -->
    <script src="index.js"></script>
</body>
</html>
